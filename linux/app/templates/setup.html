<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首次设置 - 视频推流系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0f0f1a; color:#e0e0e0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#1a1a2e; border-radius:12px; padding:32px; border:1px solid #2a2a4a; max-width:400px; width:100%; }
h1 { font-size:22px; text-align:center; background:linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.sub { text-align:center; color:#888; font-size:13px; margin-bottom:24px; }
input { width:100%; padding:10px 14px; background:#16162a; border:1px solid #333; border-radius:6px; color:#fff; font-size:14px; margin-bottom:12px; outline:none; transition:border .2s; }
input:focus { border-color:#667eea; }
.btn { width:100%; padding:10px 24px; border:none; border-radius:6px; cursor:pointer; font-size:14px; font-weight:500; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; transition:all .2s; }
.btn:hover { opacity:.85; transform:translateY(-1px); }
.hint { font-size:11px; color:#666; margin-top:-8px; margin-bottom:12px; }
.toast { position:fixed; bottom:20px; right:20px; padding:12px 20px; border-radius:8px; color:#fff; font-size:14px; z-index:999; display:none; }
.toast.error { background:#ef4444; }
.toast.success { background:#22c55e; }
</style>
</head>
<body>
<div class="card">
  <h1>🚀 欢迎使用</h1>
  <p class="sub">首次运行，请创建管理员账号</p>
  <input type="text" id="setupUid" placeholder="管理员账号（2-20字符）">
  <input type="password" id="setupPw" placeholder="密码（至少6位）">
  <input type="password" id="setupPw2" placeholder="确认密码">
  <button class="btn" onclick="doSetup()">创建并登录</button>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
}

async function doSetup() {
  const uid = document.getElementById('setupUid').value.trim();
  const pw = document.getElementById('setupPw').value;
  const pw2 = document.getElementById('setupPw2').value;
  if (!uid || !pw) { showToast('请填写完整', 'error'); return; }
  if (pw !== pw2) { showToast('两次密码不一致', 'error'); return; }
  try {
    const r = await fetch('/api/setup/init', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid,password:pw})});
    const d = await r.json();
    if (d.success) {
      showToast('设置完成！正在跳转...', 'success');
      setTimeout(() => location.href = '/', 1000);
    } else {
      showToast(d.error, 'error');
    }
  } catch(e) { showToast('网络错误', 'error'); }
}
</script>
</body>
</html>
