name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install flask flask-cors pywebview pyinstaller

      - name: Download MediaMTX
        shell: powershell
        run: |
          $binDir = "windows/bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Invoke-WebRequest -Uri "https://gitcode.com/GitHub_Trending/me/mediamtx/releases/download/v1.19.2/mediamtx_v1.19.2_windows_amd64.zip" -OutFile "mediamtx.zip" -UseBasicParsing
          Expand-Archive -Path "mediamtx.zip" -DestinationPath $binDir -Force
          Remove-Item "mediamtx.zip" -Force
          Get-ChildItem $binDir -Recurse -Filter "mediamtx.exe" | Move-Item -Destination $binDir -Force

      - name: Download FFmpeg
        shell: powershell
        run: |
          $binDir = "windows/bin"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip" -UseBasicParsing
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp" -Force
          Get-ChildItem "ffmpeg_temp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 | Copy-Item -Destination "$binDir/ffmpeg.exe"
          Remove-Item "ffmpeg.zip" -Force
          Remove-Item "ffmpeg_temp" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build EXE
        shell: powershell
        run: cd windows; python build.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/VRCStream.exe

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VRCStream-Windows
          path: windows/dist/VRCStream.exe
